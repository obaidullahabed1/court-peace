<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Court Peace / Hokm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="table">
    <header>
      <h1>Court Peace / Hokm</h1>
      <p id="status">Click Start Game</p>
    </header>

    <div class="players">
      <div class="player top">Partner</div>
      <div class="player left">Opponent</div>
      <div class="center">
        <p id="trumpDisplay">Trump: Not selected</p>
        <div id="trumpButtons"></div>
      </div>
      <div class="player right">Opponent</div>
    </div>

    <div class="hand-area">
      <h2>You / Hakim</h2>
      <div id="hand" class="hand"></div>
    </div>

    <button id="startBtn" onclick="startGame()">Start Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
