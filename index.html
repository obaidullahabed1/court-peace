<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Court Peace / Hokm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-table">
    <header class="top-bar">
      <h1>🃏 Court Peace / Hokm</h1>
      <p id="status">Click Start Game</p>
    </header>

    <section class="scoreboard">
      <div>Your Tricks: <span id="teamA">0</span></div>
      <div>Your Hands: <span id="teamAHands">0</span></div>
      <div id="trumpDisplay">Trump: Not selected</div>
      <div>Opponent Hands: <span id="teamBHands">0</span></div>
      <div>Opponent Tricks: <span id="teamB">0</span></div>
    </section>

    <section class="table-area">
      <div class="player-zone partner-zone">
        <h3 id="partnerLabel">Partner</h3>
        <div id="partnerCards" class="back-hand horizontal"></div>
      </div>

      <div class="player-zone left-zone">
        <h3 id="leftLabel">Left Opponent</h3>
        <div id="leftCards" class="back-hand vertical"></div>
      </div>

      <div class="center-zone">
        <h2 id="currentTurn">Hakim: You</h2>
        <div id="kotDisplay" class="kot-box"></div>
        <div id="deckArea" class="deck-area">
          <img src="assets/cards/BACK.svg" alt="Deck" class="deck-card" />
        </div>
        <div id="tableCards" class="played-cards">Playing Area</div>
        <div id="trumpButtons"></div>
      </div>

      <div class="player-zone right-zone">
        <h3 id="rightLabel">Right Opponent</h3>
        <div id="rightCards" class="back-hand vertical"></div>
      </div>

      <div class="player-zone you-zone">
        <h2 id="youLabel">You / Hakim</h2>
        <div id="hand" class="player-hand"></div>
      </div>
    </section>

    <div class="controls">
      <button id="startBtn" onclick="startGame()">Start Game</button>
      <button id="newHandBtn" onclick="startNextHand()" disabled>Next Hand</button>
    </div>
  </main>

  <script src="js/deck.js"></script>
  <script src="js/players.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
